<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Notes App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Advanced Notes</h1>
    </header>

    <div class="controls">
      <input id="searchInput" type="text" placeholder="Search notes..." />
    </div>

    <form id="noteForm" class="note-form">
      <input id="noteTitle" type="text" placeholder="Note title" />
      <textarea id="noteContent" placeholder="Write your note..."></textarea>
      <div class="form-row">
        <button type="submit">Add Note</button>
        <span id="charCount">0 characters</span>
      </div>
    </form>

    <div id="notesList" class="notes-list"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
